name: CI

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

# Cancel in-progress runs when a new commit is pushed (except on master)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref == 'refs/heads/master' && github.sha || '' }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write  # Required to cancel workflow runs

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate job - all other jobs depend on this.
  # Checks if we should run CI at all (skips if no changes to crates/, libs/, etc.)
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to compare
      - name: Check for changes
        id: check
        run: |
          # Always run on tags
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "Running: tag push"
            exit 0
          fi

          # For PRs, check what changed in the PR
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- crates/ libs/ Cargo.lock Cargo.toml .github/)
            if [[ -n "$CHANGES" ]]; then
              echo "Running: PR has changes in crates/, libs/, or .github/"
              echo "$CHANGES"
            else
              echo "Skipping: PR has no changes to crates/, libs/, or .github/"
              echo "skip=true" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # For pushes, compare against the commit before this push
          BEFORE="${{ github.event.before }}"
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]] || [[ -z "$BEFORE" ]]; then
            echo "Running: new branch or cannot determine previous commit"
            exit 0
          fi

          echo "Comparing HEAD against before: $BEFORE"
          CHANGES=$(git diff --name-only $BEFORE HEAD -- crates/ libs/ Cargo.lock Cargo.toml .github/)
          if [[ -n "$CHANGES" ]]; then
            echo "Running: changes detected in crates/, libs/, or .github/"
            echo "$CHANGES"
          else
            echo "Skipping: no changes to crates/, libs/, or .github/"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
      - name: Cancel if no relevant changes
        if: steps.check.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "No relevant changes, cancelling workflow"
          gh run cancel ${{ github.run_id }}

  fmt:
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }}

  clippy:
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }}

  test:
    needs: [gate, build-linux-x64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Download troupe binary
        uses: actions/download-artifact@v4
        with:
          name: troupe-linux-x64
          path: target/debug
      - name: Make binary executable
        run: chmod +x target/debug/troupe
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run tests
        # Run single-threaded to avoid inotify race conditions
        # Remove --nocapture to reduce log output (only show on failure)
        # Disable RUST_LOG entirely in CI for minimal output
        env:
          TROUPE_BIN: ${{ github.workspace }}/target/debug/troupe
          RUST_LOG: warn
        run: cargo test --workspace -- --test-threads=1
      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }}

  demos:
    needs: [gate, build-linux-x64]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Download troupe binary
        uses: actions/download-artifact@v4
        with:
          name: troupe-linux-x64
          path: bin
      - name: Download barnum binary
        uses: actions/download-artifact@v4
        with:
          name: barnum-linux-x64
          path: bin
      - name: Make binaries executable
        run: chmod +x bin/troupe bin/barnum
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc
      - name: Check .dot files are up-to-date
        env:
          BARNUM: ${{ github.workspace }}/bin/barnum
        run: ./scripts/generate-graphs.sh --check
      - name: Run all demos
        env:
          TROUPE: ${{ github.workspace }}/bin/troupe
          BARNUM: ${{ github.workspace }}/bin/barnum
          RUST_LOG: off
        run: ./scripts/run-all-demos.sh
      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }}

  build-macos-x64:
    needs: gate
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            target/x86_64-apple-darwin/release/troupe
            target/x86_64-apple-darwin/release/barnum
          key: macos-x64-${{ hashFiles('Cargo.lock', 'crates/**') }}
      - uses: dtolnay/rust-toolchain@1.93.1
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        if: steps.cache-binaries.outputs.cache-hit != 'true'
      - name: Write version files
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-main-${GITHUB_SHA::8}"
          fi
          echo "$VERSION" > libs/troupe/version.txt
          echo "$VERSION" > libs/barnum/version.txt
      - name: Build
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cargo build --release --target x86_64-apple-darwin -p troupe_cli -p barnum_cli
      - uses: actions/upload-artifact@v4
        with:
          name: troupe-macos-x64
          path: target/x86_64-apple-darwin/release/troupe
      - uses: actions/upload-artifact@v4
        with:
          name: barnum-macos-x64
          path: target/x86_64-apple-darwin/release/barnum
      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }}

  build-macos-arm64:
    needs: gate
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            target/aarch64-apple-darwin/release/troupe
            target/aarch64-apple-darwin/release/barnum
          key: macos-arm64-${{ hashFiles('Cargo.lock', 'crates/**') }}
      - uses: dtolnay/rust-toolchain@1.93.1
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        if: steps.cache-binaries.outputs.cache-hit != 'true'
      - name: Write version files
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-main-${GITHUB_SHA::8}"
          fi
          echo "$VERSION" > libs/troupe/version.txt
          echo "$VERSION" > libs/barnum/version.txt
      - name: Build
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cargo build --release --target aarch64-apple-darwin -p troupe_cli -p barnum_cli
      - uses: actions/upload-artifact@v4
        with:
          name: troupe-macos-arm64
          path: target/aarch64-apple-darwin/release/troupe
      - uses: actions/upload-artifact@v4
        with:
          name: barnum-macos-arm64
          path: target/aarch64-apple-darwin/release/barnum
      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }}

  build-linux-x64:
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            target/x86_64-unknown-linux-musl/release/troupe
            target/x86_64-unknown-linux-musl/release/barnum
          key: linux-x64-${{ hashFiles('Cargo.lock', 'crates/**') }}
      - uses: dtolnay/rust-toolchain@1.93.1
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl-tools
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
        if: steps.cache-binaries.outputs.cache-hit != 'true'
      - name: Write version files
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-main-${GITHUB_SHA::8}"
          fi
          echo "$VERSION" > libs/troupe/version.txt
          echo "$VERSION" > libs/barnum/version.txt
      - name: Build
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cargo build --release --target x86_64-unknown-linux-musl -p troupe_cli -p barnum_cli
      - uses: actions/upload-artifact@v4
        with:
          name: troupe-linux-x64
          path: target/x86_64-unknown-linux-musl/release/troupe
      - uses: actions/upload-artifact@v4
        with:
          name: barnum-linux-x64
          path: target/x86_64-unknown-linux-musl/release/barnum
      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }}

  build-linux-arm64:
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            target/aarch64-unknown-linux-musl/release/troupe
            target/aarch64-unknown-linux-musl/release/barnum
          key: linux-arm64-${{ hashFiles('Cargo.lock', 'crates/**') }}
      - uses: dtolnay/rust-toolchain@1.93.1
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        with:
          targets: aarch64-unknown-linux-musl
      - name: Install cross
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cargo install cross --git https://github.com/cross-rs/cross
      - uses: Swatinem/rust-cache@v2
        if: steps.cache-binaries.outputs.cache-hit != 'true'
      - name: Write version files
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-main-${GITHUB_SHA::8}"
          fi
          echo "$VERSION" > libs/troupe/version.txt
          echo "$VERSION" > libs/barnum/version.txt
      - name: Build
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cross build --release --target aarch64-unknown-linux-musl -p troupe_cli -p barnum_cli
      - uses: actions/upload-artifact@v4
        with:
          name: troupe-linux-arm64
          path: target/aarch64-unknown-linux-musl/release/troupe
      - uses: actions/upload-artifact@v4
        with:
          name: barnum-linux-arm64
          path: target/aarch64-unknown-linux-musl/release/barnum
      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }}

  build-windows-x64:
    needs: gate
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            target/x86_64-pc-windows-msvc/release/troupe.exe
            target/x86_64-pc-windows-msvc/release/barnum.exe
          key: windows-x64-${{ hashFiles('Cargo.lock', 'crates/**') }}
      - uses: dtolnay/rust-toolchain@1.93.1
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        if: steps.cache-binaries.outputs.cache-hit != 'true'
      - name: Write version files
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/v(.+)$') {
            $VERSION = $Matches[1]
          } else {
            $VERSION = "0.0.0-main-$($env:GITHUB_SHA.Substring(0,8))"
          }
          $VERSION | Out-File -FilePath libs/troupe/version.txt -Encoding utf8 -NoNewline
          $VERSION | Out-File -FilePath libs/barnum/version.txt -Encoding utf8 -NoNewline
      - name: Build
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cargo build --release --target x86_64-pc-windows-msvc -p troupe_cli -p barnum_cli
      - uses: actions/upload-artifact@v4
        with:
          name: troupe-win-x64
          path: target/x86_64-pc-windows-msvc/release/troupe.exe
      - uses: actions/upload-artifact@v4
        with:
          name: barnum-win-x64
          path: target/x86_64-pc-windows-msvc/release/barnum.exe
      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }}

  build-schema:
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Generate Barnum config schema
        run: cargo run -p barnum_config --bin build_barnum_schema
      - uses: actions/upload-artifact@v4
        with:
          name: barnum-config-schema
          path: libs/barnum/barnum-config-schema.json
      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }}

  build-website:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ./docs-website
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: docs-website/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build website
        run: pnpm build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build
          path: docs-website/build/
          retention-days: 1
          if-no-files-found: error

  deploy-website:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-website]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Download build folder
        uses: actions/download-artifact@v4
        with:
          name: docusaurus-build
          path: docs-website/build
      - name: Deploy to barnum-circus.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: barnum-circus/barnum-circus.github.io
          publish_branch: main
          publish_dir: docs-website/build
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy docs from barnum@${{ github.sha }}'

  publish:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    needs: [fmt, clippy, test, demos, build-macos-x64, build-macos-arm64, build-linux-x64, build-linux-arm64, build-windows-x64, build-schema]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@barnum'

      - name: Download troupe macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: troupe-macos-x64
          path: libs/troupe/artifacts/macos-x64

      - name: Download troupe macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: troupe-macos-arm64
          path: libs/troupe/artifacts/macos-arm64

      - name: Download troupe Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: troupe-linux-x64
          path: libs/troupe/artifacts/linux-x64

      - name: Download troupe Linux arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: troupe-linux-arm64
          path: libs/troupe/artifacts/linux-arm64

      - name: Download troupe Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: troupe-win-x64
          path: libs/troupe/artifacts/win-x64

      - name: Download barnum macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: barnum-macos-x64
          path: libs/barnum/artifacts/macos-x64

      - name: Download barnum macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: barnum-macos-arm64
          path: libs/barnum/artifacts/macos-arm64

      - name: Download barnum Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: barnum-linux-x64
          path: libs/barnum/artifacts/linux-x64

      - name: Download barnum Linux arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: barnum-linux-arm64
          path: libs/barnum/artifacts/linux-arm64

      - name: Download barnum Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: barnum-win-x64
          path: libs/barnum/artifacts/win-x64

      - name: Make binaries executable
        run: |
          chmod +x libs/troupe/artifacts/macos-x64/troupe
          chmod +x libs/troupe/artifacts/macos-arm64/troupe
          chmod +x libs/troupe/artifacts/linux-x64/troupe
          chmod +x libs/troupe/artifacts/linux-arm64/troupe
          chmod +x libs/barnum/artifacts/macos-x64/barnum
          chmod +x libs/barnum/artifacts/macos-arm64/barnum
          chmod +x libs/barnum/artifacts/linux-x64/barnum
          chmod +x libs/barnum/artifacts/linux-arm64/barnum

      - name: Download Barnum config schema
        uses: actions/download-artifact@v4
        with:
          name: barnum-config-schema
          path: libs/barnum

      - name: Set version for main branch
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: |
          VERSION="0.0.0-main-${GITHUB_SHA::8}"
          cd libs/troupe
          npm version $VERSION --no-git-tag-version
          cd ../barnum
          npm version $VERSION --no-git-tag-version

      - name: Publish troupe to npm (main tag)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npm publish --access public --tag main
        working-directory: libs/troupe
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish barnum to npm (main tag)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npm publish --access public --tag main
        working-directory: libs/barnum
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish troupe to npm (latest tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --access public --tag latest
        working-directory: libs/troupe
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish barnum to npm (latest tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --access public --tag latest
        working-directory: libs/barnum
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
