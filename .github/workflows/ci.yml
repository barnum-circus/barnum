name: CI

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

# Cancel in-progress runs when a new commit is pushed (except on master)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref == 'refs/heads/master' && github.sha || '' }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  typescript:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies (barnum)
        run: pnpm install --frozen-lockfile
        working-directory: libs/barnum
      - name: TypeScript type-check (barnum)
        run: pnpm exec tsc --noEmit
        working-directory: libs/barnum
      - name: Run tests (barnum)
        run: pnpm exec vitest run
        working-directory: libs/barnum
      - name: Build barnum (emit .d.ts for demo type-checking)
        run: pnpm run build
        working-directory: libs/barnum
      - name: Install and type-check demos
        run: |
          for demo in demos/*/; do
            if [ -f "$demo/tsconfig.json" ]; then
              echo "=== $demo ==="
              (cd "$demo" && pnpm install --frozen-lockfile && pnpm exec tsc --noEmit)
            fi
          done

  demo-tests:
    needs: typescript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Install library dependencies
        run: pnpm install --frozen-lockfile
        working-directory: libs/barnum
      - name: Build barnum binary
        run: cargo build --locked -p barnum_cli
      - name: Run simple-workflow demo
        run: pnpm install --frozen-lockfile && pnpm run demo
        working-directory: demos/simple-workflow
      - name: Run retry-on-error demo
        run: pnpm install --frozen-lockfile && pnpm run demo
        working-directory: demos/retry-on-error

  # Gate for Rust jobs - skips if no changes to crates/, libs/, etc.
  gate-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for changes
        id: check
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "Running: tag push"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- crates/ libs/ Cargo.lock Cargo.toml .github/)
            if [[ -n "$CHANGES" ]]; then
              echo "Running: PR has changes in crates/, libs/, or .github/"
              echo "$CHANGES"
            else
              echo "Skipping: PR has no changes to crates/, libs/, or .github/"
              echo "skip=true" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]] || [[ -z "$BEFORE" ]]; then
            echo "Running: new branch or cannot determine previous commit"
            exit 0
          fi

          echo "Comparing HEAD against before: $BEFORE"
          if ! git cat-file -e "$BEFORE" 2>/dev/null; then
            echo "Running: before commit unreachable (force push)"
            exit 0
          fi
          CHANGES=$(git diff --name-only $BEFORE HEAD -- crates/ libs/ Cargo.lock Cargo.toml .github/)
          if [[ -n "$CHANGES" ]]; then
            echo "Running: changes detected in crates/, libs/, or .github/"
            echo "$CHANGES"
          else
            echo "Skipping: no changes to crates/, libs/, or .github/"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

  # Gate for docs website - skips if no changes to docs-website/
  gate-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for docs changes
        id: check
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "Running: tag push"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- docs-website/ .github/)
            if [[ -n "$CHANGES" ]]; then
              echo "Running: PR has changes in docs-website/ or .github/"
              echo "$CHANGES"
            else
              echo "Skipping: PR has no changes to docs-website/ or .github/"
              echo "skip=true" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]] || [[ -z "$BEFORE" ]]; then
            echo "Running: new branch or cannot determine previous commit"
            exit 0
          fi

          echo "Comparing HEAD against before: $BEFORE"
          if ! git cat-file -e "$BEFORE" 2>/dev/null; then
            echo "Running: before commit unreachable (force push)"
            exit 0
          fi
          CHANGES=$(git diff --name-only $BEFORE HEAD -- docs-website/ .github/)
          if [[ -n "$CHANGES" ]]; then
            echo "Running: changes detected in docs-website/ or .github/"
            echo "$CHANGES"
          else
            echo "Skipping: no changes to docs-website/ or .github/"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

  fmt:
    needs: gate-rust
    if: needs.gate-rust.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  lockfiles:
    needs: gate-rust
    if: needs.gate-rust.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - name: Verify Cargo.lock is up to date
        run: cargo check --locked --workspace

  clippy:
    needs: gate-rust
    if: needs.gate-rust.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

  test:
    needs: gate-rust
    if: needs.gate-rust.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run tests
        env:
          RUST_LOG: warn
          TEST_TMPDIR: /tmp/bt
        run: cargo test --locked --workspace -- --test-threads=1

  build-macos-x64:
    needs: [gate-rust, typescript, test]
    if: needs.gate-rust.outputs.skip != 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/trapeze' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            target/x86_64-apple-darwin/release/barnum
          key: macos-x64-${{ github.ref }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/*/Cargo.toml', 'crates/*/src/**') }}
      - uses: dtolnay/rust-toolchain@1.93.1
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        if: steps.cache-binaries.outputs.cache-hit != 'true'
      - name: Write version files
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ "$GITHUB_REF" == "refs/heads/trapeze" ]]; then
            VERSION="0.0.0-trapeze-${GITHUB_SHA::8}"
          else
            VERSION="0.0.0-main-${GITHUB_SHA::8}"
          fi
          echo "$VERSION" > libs/barnum/version.txt
      - name: Build
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cargo build --locked --release --target x86_64-apple-darwin -p barnum_cli
      - uses: actions/upload-artifact@v4
        with:
          name: barnum-macos-x64
          path: target/x86_64-apple-darwin/release/barnum

  build-macos-arm64:
    needs: [gate-rust, typescript, test]
    if: needs.gate-rust.outputs.skip != 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/trapeze' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            target/aarch64-apple-darwin/release/barnum
          key: macos-arm64-${{ github.ref }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/*/Cargo.toml', 'crates/*/src/**') }}
      - uses: dtolnay/rust-toolchain@1.93.1
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        if: steps.cache-binaries.outputs.cache-hit != 'true'
      - name: Write version files
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ "$GITHUB_REF" == "refs/heads/trapeze" ]]; then
            VERSION="0.0.0-trapeze-${GITHUB_SHA::8}"
          else
            VERSION="0.0.0-main-${GITHUB_SHA::8}"
          fi
          echo "$VERSION" > libs/barnum/version.txt
      - name: Build
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cargo build --locked --release --target aarch64-apple-darwin -p barnum_cli
      - uses: actions/upload-artifact@v4
        with:
          name: barnum-macos-arm64
          path: target/aarch64-apple-darwin/release/barnum

  build-linux-x64:
    needs: [gate-rust, typescript]
    if: needs.gate-rust.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            target/x86_64-unknown-linux-musl/release/barnum
          key: linux-x64-${{ github.ref }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/*/Cargo.toml', 'crates/*/src/**') }}
      - uses: dtolnay/rust-toolchain@1.93.1
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl-tools
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
        if: steps.cache-binaries.outputs.cache-hit != 'true'
      - name: Write version files
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ "$GITHUB_REF" == "refs/heads/trapeze" ]]; then
            VERSION="0.0.0-trapeze-${GITHUB_SHA::8}"
          else
            VERSION="0.0.0-main-${GITHUB_SHA::8}"
          fi
          echo "$VERSION" > libs/barnum/version.txt
      - name: Build
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cargo build --locked --release --target x86_64-unknown-linux-musl -p barnum_cli
      - uses: actions/upload-artifact@v4
        with:
          name: barnum-linux-x64
          path: target/x86_64-unknown-linux-musl/release/barnum

  build-linux-arm64:
    needs: [gate-rust, typescript, test]
    if: needs.gate-rust.outputs.skip != 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/trapeze' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            target/aarch64-unknown-linux-musl/release/barnum
          key: linux-arm64-${{ github.ref }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/*/Cargo.toml', 'crates/*/src/**') }}
      - uses: dtolnay/rust-toolchain@1.93.1
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        with:
          targets: aarch64-unknown-linux-musl
      - name: Install cross
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cargo install cross --git https://github.com/cross-rs/cross
      - uses: Swatinem/rust-cache@v2
        if: steps.cache-binaries.outputs.cache-hit != 'true'
      - name: Write version files
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ "$GITHUB_REF" == "refs/heads/trapeze" ]]; then
            VERSION="0.0.0-trapeze-${GITHUB_SHA::8}"
          else
            VERSION="0.0.0-main-${GITHUB_SHA::8}"
          fi
          echo "$VERSION" > libs/barnum/version.txt
      - name: Build
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cross build --locked --release --target aarch64-unknown-linux-musl -p barnum_cli
      - uses: actions/upload-artifact@v4
        with:
          name: barnum-linux-arm64
          path: target/aarch64-unknown-linux-musl/release/barnum

  build-windows-x64:
    needs: [gate-rust, typescript, test]
    if: needs.gate-rust.outputs.skip != 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/trapeze' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            target/x86_64-pc-windows-msvc/release/barnum.exe
          key: windows-x64-${{ github.ref }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/*/Cargo.toml', 'crates/*/src/**') }}
      - uses: dtolnay/rust-toolchain@1.93.1
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        if: steps.cache-binaries.outputs.cache-hit != 'true'
      - name: Write version files
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/v(.+)$') {
            $VERSION = $Matches[1]
          } elseif ($env:GITHUB_REF -eq 'refs/heads/trapeze') {
            $VERSION = "0.0.0-trapeze-$($env:GITHUB_SHA.Substring(0,8))"
          } else {
            $VERSION = "0.0.0-main-$($env:GITHUB_SHA.Substring(0,8))"
          }
          $VERSION | Out-File -FilePath libs/barnum/version.txt -Encoding utf8 -NoNewline
      - name: Build
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cargo build --locked --release --target x86_64-pc-windows-msvc -p barnum_cli
      - uses: actions/upload-artifact@v4
        with:
          name: barnum-win-x64
          path: target/x86_64-pc-windows-msvc/release/barnum.exe

  build-website:
    needs: gate-docs
    if: needs.gate-docs.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ./docs-website
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: docs-website/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build website
        run: pnpm build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build
          path: docs-website/build/
          retention-days: 1
          if-no-files-found: error

  deploy-website:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [gate-docs, build-website, test, demo-tests]
    if: >-
      always() &&
      needs.gate-docs.outputs.skip != 'true' &&
      needs.build-website.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.demo-tests.result == 'success' || needs.demo-tests.result == 'skipped') &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Download build folder
        uses: actions/download-artifact@v4
        with:
          name: docusaurus-build
          path: docs-website/build
      - name: Deploy to barnum-circus.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: barnum-circus/barnum-circus.github.io
          publish_branch: main
          publish_dir: docs-website/build
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy docs from barnum@${{ github.sha }}'

  publish:
    if: needs.gate-rust.outputs.skip != 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/trapeze' || startsWith(github.ref, 'refs/tags/v'))
    needs: [gate-rust, typescript, fmt, lockfiles, clippy, test, build-macos-x64, build-macos-arm64, build-linux-x64, build-linux-arm64, build-windows-x64]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@barnum'

      - name: Download barnum macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: barnum-macos-x64
          path: libs/barnum/artifacts/macos-x64

      - name: Download barnum macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: barnum-macos-arm64
          path: libs/barnum/artifacts/macos-arm64

      - name: Download barnum Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: barnum-linux-x64
          path: libs/barnum/artifacts/linux-x64

      - name: Download barnum Linux arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: barnum-linux-arm64
          path: libs/barnum/artifacts/linux-arm64

      - name: Download barnum Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: barnum-win-x64
          path: libs/barnum/artifacts/win-x64

      - name: Make binaries executable
        run: |
          chmod +x libs/barnum/artifacts/macos-x64/barnum
          chmod +x libs/barnum/artifacts/macos-arm64/barnum
          chmod +x libs/barnum/artifacts/linux-x64/barnum
          chmod +x libs/barnum/artifacts/linux-arm64/barnum

      - name: Set version and npm tag
        id: version
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            NPM_TAG="latest"
          elif [[ "$GITHUB_REF" == "refs/heads/trapeze" ]]; then
            VERSION="0.0.0-trapeze-${GITHUB_SHA::8}"
            NPM_TAG="trapeze"
          else
            VERSION="0.0.0-main-${GITHUB_SHA::8}"
            NPM_TAG="main"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "npm_tag=$NPM_TAG" >> $GITHUB_OUTPUT
          cd libs/barnum
          npm version $VERSION --no-git-tag-version

      - name: Publish barnum to npm
        run: npm publish --access public --tag ${{ steps.version.outputs.npm_tag }}
        working-directory: libs/barnum
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
